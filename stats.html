<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>全國寵物登記統計</title>
<meta name="theme-color" content="#0f766e" />
<link rel="icon" href="favicon-32.png" sizes="32x32" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<style>
  :root{
    --teal:#0f766e; --teal-d:#0c5c56; --dog:#0f766e; --cat:#d97706;
    --bg:#f1f5f4; --card:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);min-height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;
    padding:calc(18px + env(safe-area-inset-top)) 16px 18px;
    border-radius:0 0 22px 22px;box-shadow:0 6px 18px rgba(15,118,110,.22);
    display:flex;align-items:center;gap:12px;
  }
  header a.back{color:#fff;text-decoration:none;font-size:1.5rem;line-height:1;flex:0 0 auto}
  header h1{font-size:1.15rem;margin:0}
  header p{margin:2px 0 0;font-size:.72rem;opacity:.85}
  main{max-width:480px;margin:0 auto;padding:16px 14px 32px}

  .section-label{font-size:.78rem;color:var(--muted);margin:18px 4px 10px;font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}

  /* 全國摘要 */
  .sum{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .stat .h{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted)}
  .stat .dot{width:10px;height:10px;border-radius:50%}
  .stat .big{font-size:1.5rem;font-weight:700;margin:4px 0 0;letter-spacing:.5px}
  .stat .sub{font-size:.72rem;color:var(--muted);margin-top:2px}
  .stat .up{color:#dc2626} .stat .down{color:#059669}

  /* 切換 */
  .toggle{display:flex;gap:8px;margin:4px 0 0}
  .toggle button{
    flex:1;height:40px;border:1px solid var(--line);background:#fff;border-radius:11px;
    font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;
  }
  .toggle button.on[data-a="dog"]{background:var(--teal);border-color:var(--teal);color:#fff}
  .toggle button.on[data-a="cat"]{background:var(--cat);border-color:var(--cat);color:#fff}

  /* 長條圖 */
  .bars{margin-top:4px}
  .bar{padding:8px 0;border-top:1px solid var(--line)}
  .bar:first-child{border-top:none}
  .bar .top{display:flex;justify-content:space-between;font-size:.84rem;margin-bottom:5px}
  .bar .top .nm{font-weight:600}
  .bar .top .vl{color:var(--muted);font-variant-numeric:tabular-nums}
  .bar .track{height:9px;background:#eef2f1;border-radius:6px;overflow:hidden}
  .bar .fill{height:100%;border-radius:6px;transition:width .5s ease}
  .bar .rate{font-size:.7rem;color:var(--muted);margin-top:3px}

  /* 趨勢 */
  .trend{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .trend .col{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
  .trend .col h3{margin:0 0 8px;font-size:.86rem;display:flex;align-items:center;gap:6px}
  .trend .yr{display:flex;align-items:center;gap:8px;margin:6px 0}
  .trend .yr .y{font-size:.74rem;color:var(--muted);flex:0 0 34px}
  .trend .yr .t{flex:1;height:8px;background:#eef2f1;border-radius:5px;overflow:hidden}
  .trend .yr .t i{display:block;height:100%;border-radius:5px}
  .trend .yr .n{font-size:.74rem;flex:0 0 auto;font-variant-numeric:tabular-nums}

  .note{font-size:.72rem;color:var(--muted);line-height:1.6;margin-top:18px;text-align:center;padding:0 8px}
  .note a{color:var(--teal)}
  #err{display:none;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;
    border-radius:12px;padding:14px;font-size:.85rem;text-align:center}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html" aria-label="返回">‹</a>
  <div>
    <h1>📊 全國寵物登記統計</h1>
    <p id="srcline">資料載入中…</p>
  </div>
</header>

<main>
  <div id="err">資料載入失敗，請確認連線後重新整理。</div>

  <div class="section-label">全國登記數（<span id="yLabel">—</span>）</div>
  <div class="sum" id="sum"></div>

  <div class="section-label">各縣市登記數</div>
  <div class="toggle" id="toggle">
    <button data-a="dog" class="on">🐶 犬</button>
    <button data-a="cat">🐱 貓</button>
  </div>
  <div class="card" style="margin-top:10px">
    <div class="bars" id="bars"></div>
  </div>

  <div class="section-label">年度趨勢</div>
  <div class="trend" id="trend"></div>

  <p class="note" id="note"></p>
</main>

<script>
  const fmt = (n) => (n == null ? '—' : n.toLocaleString('en-US'));
  const state = { data: null, animal: 'dog' };

  fetch('data/pet-stats.json')
    .then((r) => r.json())
    .then((d) => { state.data = d; init(d); })
    .catch(() => { document.getElementById('err').style.display = 'block';
                   document.getElementById('srcline').textContent = '資料載入失敗'; });

  function init(d) {
    const ly = String(d.latestYear);
    const py = String(d.latestYear - 1);
    document.getElementById('yLabel').textContent = ly + ' 年';
    document.getElementById('srcline').textContent = '資料截至 ' + d.fetchedAt + '・年度 ' + ly;
    document.getElementById('note').innerHTML =
      d.note + '<br>資料來源：<a href="' + d.sourceUrl + '" target="_blank" rel="noopener">' +
      d.source + '</a>';

    renderSum(d, ly, py);
    renderTrend(d);
    renderBars();

    document.getElementById('toggle').addEventListener('click', (e) => {
      const b = e.target.closest('button'); if (!b) return;
      state.animal = b.dataset.a;
      [...document.querySelectorAll('#toggle button')].forEach((x) =>
        x.classList.toggle('on', x.dataset.a === state.animal));
      renderBars();
    });
  }

  function delta(now, prev) {
    if (prev == null || !prev) return '';
    const diff = now - prev;
    const pct = Math.abs(diff / prev * 100).toFixed(1);
    const cls = diff >= 0 ? 'up' : 'down';
    const arrow = diff >= 0 ? '▲' : '▼';
    return '<span class="' + cls + '">' + arrow + ' ' + pct + '% vs 前一年</span>';
  }

  function renderSum(d, ly, py) {
    const cfg = [
      { a: 'dog', label: '犬', emoji: '🐶', color: 'var(--dog)' },
      { a: 'cat', label: '貓', emoji: '🐱', color: 'var(--cat)' },
    ];
    document.getElementById('sum').innerHTML = cfg.map((c) => {
      const now = d.years[ly].national[c.a];
      const prev = d.years[py] ? d.years[py].national[c.a] : null;
      return '<div class="stat">' +
        '<div class="h"><span class="dot" style="background:' + c.color + '"></span>' +
        c.emoji + ' ' + c.label + '隻登記</div>' +
        '<div class="big">' + fmt(now.reg) + '</div>' +
        '<div class="sub">絕育率 ' + now.rate + '%</div>' +
        '<div class="sub">' + delta(now.reg, prev ? prev.reg : null) + '</div>' +
        '</div>';
    }).join('');
  }

  function renderBars() {
    const d = state.data, a = state.animal;
    const ly = String(d.latestYear);
    const list = d.years[ly].byCounty[a];
    const max = Math.max(...list.map((x) => x.reg)) || 1;
    const color = a === 'dog' ? 'var(--dog)' : 'var(--cat)';
    document.getElementById('bars').innerHTML = list.map((c) =>
      '<div class="bar">' +
        '<div class="top"><span class="nm">' + c.name + '</span>' +
        '<span class="vl">' + fmt(c.reg) + '</span></div>' +
        '<div class="track"><div class="fill" style="width:' +
          (c.reg / max * 100) + '%;background:' + color + '"></div></div>' +
        '<div class="rate">絕育率 ' + c.rate + '%</div>' +
      '</div>'
    ).join('');
  }

  function renderTrend(d) {
    const years = Object.keys(d.years).sort();
    const cfg = [
      { a: 'dog', label: '🐶 犬隻登記', color: 'var(--dog)' },
      { a: 'cat', label: '🐱 貓隻登記', color: 'var(--cat)' },
    ];
    const maxAll = Math.max(...cfg.flatMap((c) =>
      years.map((y) => d.years[y].national[c.a].reg))) || 1;
    document.getElementById('trend').innerHTML = cfg.map((c) =>
      '<div class="col"><h3>' + c.label + '</h3>' +
      years.map((y) => {
        const v = d.years[y].national[c.a].reg;
        return '<div class="yr"><span class="y">' + y + '</span>' +
          '<span class="t"><i style="width:' + (v / maxAll * 100) + '%;background:' + c.color + '"></i></span>' +
          '<span class="n">' + fmt(v) + '</span></div>';
      }).join('') +
      '</div>'
    ).join('');
  }
</script>
</body>
</html>
